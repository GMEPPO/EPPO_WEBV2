<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPPO by Groupe GM - Gestão de Encomendas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="menu-hamburguesa.css">
    <script>(function(){try{var r=localStorage.getItem('eppo_user_role');if(r==='compras')document.documentElement.classList.add('role-compras');}catch(e){}})();</script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="load-config.js"></script>
    <script src="supabase-config-universal.js"></script>
    <script src="auth.js"></script>
    <style>
        /* Mismo aspecto que el resto de la web: variables de tema */
        .ge-container { max-width: 1400px; margin: 0 auto; padding: var(--space-8) var(--space-6); }
        .ge-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6); padding-bottom: var(--space-4); border-bottom: 2px solid var(--bg-gray-200); }
        .ge-title { font-family: var(--font-display); font-size: 2rem; font-weight: 600; color: var(--text-primary); }
        .ge-table-wrap { background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--space-6); border: 1px solid var(--bg-gray-200); overflow-x: auto; box-shadow: var(--shadow-sm); }
        .ge-table { width: 100%; border-collapse: collapse; }
        .ge-table th { padding: 12px 16px; text-align: left; font-weight: 600; color: var(--text-primary); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid var(--bg-gray-200); background: var(--bg-gray-50); }
        .ge-table td { padding: 12px 16px; border-bottom: 1px solid var(--bg-gray-200); color: var(--text-primary); font-size: 0.875rem; }
        .ge-table tbody tr:hover { background: var(--bg-gray-50); }
        .ge-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .ge-tag { display: inline-block; padding: 4px 10px; border-radius: 999px; background: var(--primary-500); color: var(--text-white); font-size: 0.75rem; font-weight: 500; }
        .ge-btn { padding: 8px 16px; border-radius: var(--radius-md); border: none; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.875rem; transition: all 0.2s; }
        .ge-btn-primary { background: var(--primary-500); color: var(--text-white); }
        .ge-btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .ge-btn-secondary { background: var(--bg-gray-200); color: var(--text-primary); border: 1px solid var(--bg-gray-200); }
        .ge-btn-secondary:hover { background: var(--bg-gray-100); }
        .ge-btn-success { background: var(--success-500); color: var(--text-white); }
        .ge-btn-success:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .ge-details-view { display: none; }
        .ge-details-view.active { display: block; }
        .ge-list-view { display: block; }
        .ge-list-view.hidden { display: none; }
        .ge-detail-header { margin-bottom: var(--space-6); display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap; }
        .ge-editable { padding: 6px 10px; border: 1px solid var(--bg-gray-200); border-radius: var(--radius-md); font-size: 0.875rem; background: var(--bg-white); color: var(--text-primary); width: 100%; max-width: 180px; }
        .ge-editable::placeholder { color: var(--text-muted); }
        .ge-loading { text-align: center; padding: 48px; color: var(--text-secondary); }
        .ge-empty { text-align: center; padding: 48px; color: var(--text-secondary); }
        .ge-fornecedor-block { margin-bottom: var(--space-8); background: var(--bg-white); border-radius: var(--radius-lg); padding: var(--space-6); border: 1px solid var(--bg-gray-200); box-shadow: var(--shadow-sm); }
        .ge-fornecedor-title { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); margin-bottom: var(--space-4); padding-bottom: var(--space-2); border-bottom: 1px solid var(--bg-gray-200); }
        .ge-fornecedor-form { display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap; margin-bottom: var(--space-4); }
        .ge-fornecedor-form label { font-size: 0.8rem; color: var(--text-secondary); display: block; margin-bottom: 4px; }
        .ge-tabs { display: flex; gap: 0; margin-bottom: var(--space-6); border-bottom: 2px solid var(--bg-gray-200); }
        .ge-tab { padding: 10px 20px; border: none; background: transparent; color: var(--text-secondary); font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; display: inline-flex; align-items: center; gap: 8px; }
        .ge-tab:hover { color: var(--text-primary); }
        .ge-tab.ge-tab-active { color: var(--primary-500); border-bottom-color: var(--primary-500); }
        .ge-tab-count { display: inline-block; min-width: 20px; padding: 2px 6px; margin-left: 6px; font-size: 0.7rem; font-weight: 600; line-height: 1.2; text-align: center; background: var(--bg-gray-200); color: var(--text-primary); border-radius: 10px; }
        .ge-tab.ge-tab-active .ge-tab-count { background: var(--primary-500); color: var(--text-white); }
        .ge-obs-input { padding: 6px 10px; border: 1px solid var(--bg-gray-200); border-radius: var(--radius-md); font-size: 0.875rem; background: var(--bg-white); color: var(--text-primary); width: 100%; min-width: 200px; min-height: 60px; resize: vertical; }
        /* Distribución producto + anexos: dos columnas para equilibrar la fila */
        .ge-product-details { display: grid; grid-template-columns: 1fr auto; gap: 1rem; align-items: start; min-width: 260px; max-width: 400px; }
        .ge-product-details .ge-product-info { min-width: 0; }
        .ge-product-details .ge-product-anexos { flex-shrink: 0; min-width: 0; padding-left: 0.75rem; border-left: 1px solid var(--bg-gray-200, #334155); }
        .ge-product-details .ge-anexos-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.25rem; }
        .ge-table .ge-td-product { vertical-align: top; min-width: 280px; }
        .ge-table .ge-td-product .ge-product-details { white-space: normal; }
        .ge-doc-card { flex-shrink: 0; margin: 0; }
    </style>
</head>
<body>
    <!-- Header: misma barra que el resto de la web -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <span class="logo-line1">EPPO by</span>
                <span class="logo-line2 groupe-gm">Groupe GM</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="productos-dinamico.html" class="nav-link">Products</a>
                <a href="carrito-compras.html" class="nav-link" id="nav-cart-link">Presupuesto</a>
                <a href="consultar-propuestas.html" class="nav-link" id="nav-proposals-link">Histórico</a>
                <div class="menu-dropdown">
                    <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()" aria-label="Toggle menu">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="comparar-productos.html" class="dropdown-link">
                            <i class="fas fa-balance-scale"></i>
                            <span>Comparar</span>
                        </a>
                        <a href="selector-productos.html" class="dropdown-link" id="nav-create-product-link">
                            <i class="fas fa-edit"></i>
                            <span id="create-product-text">Creador/Editor</span>
                        </a>
                        <a href="gestao-encomendas.html" class="dropdown-link">
                            <i class="fas fa-truck-loading"></i>
                            <span>Gestão de Encomendas</span>
                        </a>
                    </div>
                </div>
                
                <div class="language-selector">
                    <button class="flag-btn active" data-lang="pt" title="Português" onclick="changeLanguage('pt')">
                        <img src="https://flagcdn.com/w20/pt.png" alt="Portugal">
                    </button>
                    <button class="flag-btn" data-lang="es" title="Español" onclick="changeLanguage('es')">
                        <img src="https://flagcdn.com/w20/es.png" alt="España">
                    </button>
                </div>
                <div class="user-bar" id="user-bar">
                    <span class="user-bar-name" id="user-bar-name">—</span>
                    <span class="user-bar-sep" aria-hidden="true">|</span>
                    <span class="user-bar-role" id="user-bar-role">—</span>
                    <button type="button" class="user-bar-logout" id="user-bar-logout">Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="ge-container">
            <!-- Vista listado -->
            <div id="ge-list-view" class="ge-list-view">
                <div class="ge-header">
                    <h1 class="ge-title" id="ge-page-title">Gestão de Encomendas</h1>
                </div>
                <div class="ge-tabs">
                    <button type="button" class="ge-tab ge-tab-active" data-tab="pendientes" id="ge-tab-pendientes">
                        <i class="fas fa-clock"></i> <span id="ge-tab-pendientes-text">Pedidos pendentes</span><span class="ge-tab-count" id="ge-tab-pendientes-count"></span>
                    </button>
                    <button type="button" class="ge-tab" data-tab="encurso" id="ge-tab-encurso">
                        <i class="fas fa-truck"></i> <span id="ge-tab-encurso-text">Pedidos em curso</span><span class="ge-tab-count" id="ge-tab-encurso-count"></span>
                    </button>
                    <button type="button" class="ge-tab" data-tab="historico" id="ge-tab-historico">
                        <i class="fas fa-history"></i> <span id="ge-tab-historico-text">Histórico</span><span class="ge-tab-count" id="ge-tab-historico-count"></span>
                    </button>
                </div>
                <div class="ge-search-wrap" id="ge-search-wrap" style="margin-bottom: 1rem; position: relative; max-width: 400px;">
                    <i class="fas fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary, #94a3b8); pointer-events: none; z-index: 1;"></i>
                    <input type="text" id="ge-search-input" class="ge-search-input" placeholder="Buscar por proposta, responsável, fornecedor, tipo..." autocomplete="off" style="width: 100%; padding: 8px 12px 8px 36px; border-radius: 8px; border: 1px solid var(--border-color, #334155); background: var(--bg-secondary, #1e293b); color: var(--text-primary, #f1f5f9); font-size: 0.9rem; box-sizing: border-box;">
                </div>
                <div class="ge-table-wrap" id="ge-table-wrap-main">
                    <div id="ge-loading" class="ge-loading"><i class="fas fa-spinner fa-spin"></i> <span id="ge-loading-text">A carregar...</span></div>
                    <div id="ge-empty" class="ge-empty" style="display: none;"><span id="ge-empty-text">Nenhuma encomenda.</span></div>
                    <table class="ge-table" id="ge-table" style="display: none;">
                        <thead>
                            <tr>
                                <th id="ge-th-tipo">Tipo</th>
                                <th id="ge-th-resp">Responsável</th>
                                <th id="ge-th-forn">Fornecedores</th>
                                <th id="ge-th-numenc" style="display: none;">Nº Encomenda</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="ge-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Vista detalles: agrupada por fornecedor (un Nº Encomenda por proveedor) -->
            <div id="ge-details-view" class="ge-details-view">
                <div class="ge-detail-header">
                    <button type="button" class="ge-btn ge-btn-secondary" id="ge-back-btn"><i class="fas fa-arrow-left"></i> <span id="ge-back-text">Voltar</span></button>
                    <h2 class="ge-title" id="ge-detail-title" style="margin: 0;">Detalhes</h2>
                </div>
                <div id="ge-detail-blocks">
                    <!-- Se rellenará por fornecedor: título + 3 campos + tabla de artículos -->
                </div>
            </div>
        </div>
    </main>

    <script src="menu-hamburguesa.js"></script>
    <script src="gestao-encomendas.js"></script>
</body>
</html>
