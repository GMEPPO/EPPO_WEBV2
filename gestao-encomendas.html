<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPPO by Groupe GM - Gestão de Encomendas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="load-config.js"></script>
    <script src="supabase-config-universal.js"></script>
    <script src="auth.js"></script>
    <style>
        /* Tema oscuro fijo para esta página */
        body { background: #0f172a; color: #f1f5f9; min-height: 100vh; }
        .ge-container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
        .ge-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #334155; }
        .ge-title { font-family: var(--font-display, 'Playfair Display'); font-size: 2rem; font-weight: 600; color: #f1f5f9; }
        .ge-table-wrap { background: #1e293b; border-radius: 12px; padding: 1.5rem; border: 1px solid #334155; overflow-x: auto; }
        .ge-table { width: 100%; border-collapse: collapse; }
        .ge-table th { padding: 12px 16px; text-align: left; font-weight: 600; color: #e2e8f0; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #475569; background: #1e293b; }
        .ge-table td { padding: 12px 16px; border-bottom: 1px solid #334155; color: #f1f5f9; font-size: 0.875rem; }
        .ge-table tbody tr:hover { background: #334155; }
        .ge-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .ge-tag { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #2563eb; color: #fff; font-size: 0.75rem; font-weight: 500; }
        .ge-btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.875rem; transition: all 0.2s; }
        .ge-btn-primary { background: #2563eb; color: #fff; }
        .ge-btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
        .ge-btn-secondary { background: #475569; color: #f1f5f9; border: 1px solid #64748b; }
        .ge-btn-secondary:hover { background: #64748b; }
        .ge-details-view { display: none; }
        .ge-details-view.active { display: block; }
        .ge-list-view { display: block; }
        .ge-list-view.hidden { display: none; }
        .ge-detail-header { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .ge-editable { padding: 6px 10px; border: 1px solid #475569; border-radius: 6px; font-size: 0.875rem; background: #0f172a; color: #f1f5f9; width: 100%; max-width: 180px; }
        .ge-editable::placeholder { color: #64748b; }
        .ge-loading { text-align: center; padding: 48px; color: #94a3b8; }
        .ge-empty { text-align: center; padding: 48px; color: #94a3b8; }
        .ge-fornecedor-block { margin-bottom: 2rem; background: #1e293b; border-radius: 12px; padding: 1.5rem; border: 1px solid #334155; }
        .ge-fornecedor-title { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #475569; }
        .ge-fornecedor-form { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; }
        .ge-fornecedor-form label { font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 4px; }
        .ge-tab { padding: 10px 20px; border: none; background: transparent; color: #94a3b8; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; display: inline-flex; align-items: center; gap: 8px; }
        .ge-tab:hover { color: #f1f5f9; }
        .ge-tab.ge-tab-active { color: #2563eb; border-bottom-color: #2563eb; }
        .ge-obs-input { padding: 6px 10px; border: 1px solid #475569; border-radius: 6px; font-size: 0.875rem; background: #0f172a; color: #f1f5f9; width: 100%; min-width: 200px; min-height: 60px; resize: vertical; }
    </style>
</head>
<body>

    <main class="main-content">
        <div class="ge-container">
            <!-- Vista listado -->
            <div id="ge-list-view" class="ge-list-view">
                <div class="ge-header">
                    <h1 class="ge-title" id="ge-page-title">Gestão de Encomendas</h1>
                </div>
                <div class="ge-tabs" style="display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid #334155;">
                    <button type="button" class="ge-tab ge-tab-active" data-tab="pendientes" id="ge-tab-pendientes">
                        <i class="fas fa-clock"></i> <span id="ge-tab-pendientes-text">Pedidos pendientes</span>
                    </button>
                    <button type="button" class="ge-tab" data-tab="encurso" id="ge-tab-encurso">
                        <i class="fas fa-truck"></i> <span id="ge-tab-encurso-text">Pedidos en curso</span>
                    </button>
                </div>
                <div class="ge-table-wrap">
                    <div id="ge-loading" class="ge-loading"><i class="fas fa-spinner fa-spin"></i> <span id="ge-loading-text">A carregar...</span></div>
                    <div id="ge-empty" class="ge-empty" style="display: none;"><span id="ge-empty-text">Nenhum pedido de encomenda.</span></div>
                    <table class="ge-table" id="ge-table" style="display: none;">
                        <thead>
                            <tr>
                                <th id="ge-th-num">Nº Propuesta</th>
                                <th id="ge-th-resp">Responsable</th>
                                <th id="ge-th-forn">Fornecedores</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="ge-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Vista detalles: agrupada por fornecedor (un Nº Encomenda por proveedor) -->
            <div id="ge-details-view" class="ge-details-view">
                <div class="ge-detail-header">
                    <button type="button" class="ge-btn ge-btn-secondary" id="ge-back-btn"><i class="fas fa-arrow-left"></i> <span id="ge-back-text">Voltar</span></button>
                    <h2 class="ge-title" id="ge-detail-title" style="margin: 0;">Detalhes</h2>
                </div>
                <div id="ge-detail-blocks">
                    <!-- Se rellenará por fornecedor: título + 3 campos + tabla de artículos -->
                </div>
            </div>
        </div>
    </main>

    <script src="gestao-encomendas.js"></script>
</body>
</html>
