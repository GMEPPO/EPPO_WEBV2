<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){try{var r=localStorage.getItem('eppo_user_role');if(r==='compras')document.documentElement.classList.add('role-compras');}catch(e){}})();</script>
    <title>EPPO by Groupe GM - Categorías de Productos</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="menu-hamburguesa.css">
    <link rel="stylesheet" href="chat-widget.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="load-config.js"></script>
    <script src="supabase-config-universal.js"></script>
    <script src="translation-system.js"></script>
    <script src="auth.js"></script>
    <script src="debug-auth.js"></script>
    <script src="stock-warning.js"></script>
    <style>
        /* Hero y cards usan tema corporativo (styles.css). Solo ajustes de layout en index */
        .comparison-hero { padding: 50px 0; margin-bottom: 30px; }
        .comparison-hero h1 { font-size: 2.8rem; margin-bottom: 12px; }
        .comparison-hero p { font-size: 1.1rem; }

        .category-card {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            aspect-ratio: 1 / 1;
            display: block;
        }

        .category-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .category-card:hover img {
            transform: scale(1.08);
        }

        .category-card .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-end;
            padding: 16px;
            color: #fff;
            background: rgba(11, 28, 45, 0.5);
        }

        .category-card .title {
            font-family: "Playfair Display", serif;
            font-size: 1.5rem;
            font-weight: 600;
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
            letter-spacing: 0.02em;
        }

        /* Grid de categorías - máximo 4 por fila */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
            margin-top: 30px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
        }

        /* Limitar a 4 columnas máximo en pantallas grandes */
        @media (min-width: 1100px) {
            .categories-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* 3 columnas en tablets grandes */
        @media (max-width: 1099px) and (min-width: 769px) {
            .categories-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .comparison-hero h1 {
                font-size: 2.5rem;
            }
            
            .categories-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                max-width: 100%;
            }
            
            .category-card .title {
                font-size: 0.95rem;
            }
        }
        
        @media (max-width: 500px) {
            .categories-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .category-card .title {
                font-size: 0.9rem;
            }
            
            .category-card .overlay {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <span class="logo-line1">EPPO by</span>
                <span class="logo-line2 groupe-gm">Groupe GM</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="productos-dinamico.html" class="nav-link">Products</a>
                <a href="carrito-compras.html" class="nav-link" id="nav-cart-link">Presupuesto</a>
                <a href="consultar-propuestas.html" class="nav-link" id="nav-proposals-link">Histórico</a>
                
                <!-- Menú hamburguesa -->
                <div class="menu-dropdown">
                    <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()" aria-label="Toggle menu">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="comparar-productos.html" class="dropdown-link">
                            <i class="fas fa-balance-scale"></i>
                            <span>Comparar</span>
                        </a>
                        <a href="selector-productos.html" class="dropdown-link" id="nav-create-product-link">
                            <i class="fas fa-edit"></i>
                            <span id="create-product-text">Creador/Editor</span>
                        </a>
                        <a href="gestao-encomendas.html" class="dropdown-link">
                            <i class="fas fa-truck-loading"></i>
                            <span>Gestão de Encomendas</span>
                        </a>
                    </div>
                </div>
                
                <div class="language-selector">
                    <button class="flag-btn active" data-lang="pt" title="Português" onclick="changeLanguage('pt')">
                        <img src="https://flagcdn.com/w20/pt.png" alt="Portugal">
                    </button>
                    <button class="flag-btn" data-lang="es" title="Español" onclick="changeLanguage('es')">
                        <img src="https://flagcdn.com/w20/es.png" alt="España">
                    </button>
                </div>
                <div class="user-bar" id="user-bar">
                    <span class="user-bar-name" id="user-bar-name">—</span>
                    <span class="user-bar-sep" aria-hidden="true">|</span>
                    <span class="user-bar-role" id="user-bar-role">—</span>
                    <button type="button" class="user-bar-logout" id="user-bar-logout">Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="comparison-hero">
        <div class="container">
            <h1>Categorias</h1>
            <p>Descubre nuestra amplia gama de productos para hoteles</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <section class="container" style="padding:32px 0">
            <div class="categories-grid" id="categoriesGrid">
                <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
                    <p>Cargando categorías...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Función para cambiar idioma
        // NO sobrescribir la función global changeLanguage
        // En su lugar, escuchar el evento languageChanged para actualizar elementos específicos
        window.addEventListener('languageChanged', function(event) {
            const lang = event.detail.language;
            updatePageContent(lang);
            updateNavigationButtons(lang);
        });
        
        // Función local solo para inicialización (no sobrescribe la global)
        function initPageLanguage() {
            const savedLanguage = localStorage.getItem('language') || 'pt';
            updatePageContent(savedLanguage);
            updateNavigationButtons(savedLanguage);
        }

        // Función para actualizar el contenido de la página según el idioma
        function updatePageContent(lang) {
            const translations = {
                pt: {
                    title: 'Categorias',
                    subtitle: 'Descubra nossa ampla gama de produtos para hotéis',
                    secadores: 'Secadores',
                    planchado: 'Passar a ferro',
                    portamaletas: 'Porta-malas'
                },
                es: {
                    title: 'Categorías',
                    subtitle: 'Descubre nuestra amplia gama de productos para hoteles',
                    secadores: 'Secadores',
                    planchado: 'Planchado',
                    portamaletas: 'Portamaletas'
                },
                en: {
                    title: 'Categories',
                    subtitle: 'Discover our wide range of products for hotels',
                    secadores: 'Hair Dryers',
                    planchado: 'Ironing',
                    portamaletas: 'Luggage Racks'
                }
            };

            const t = translations[lang] || translations.pt;
            
            // Actualizar título y subtítulo
            const titleElement = document.querySelector('.comparison-hero h1');
            const subtitleElement = document.querySelector('.comparison-hero p');
            
            if (titleElement) titleElement.textContent = t.title;
            if (subtitleElement) subtitleElement.textContent = t.subtitle;
            
            // Actualizar títulos de categorías
            const categoryTitles = document.querySelectorAll('.category-card .title');
            if (categoryTitles.length >= 3) {
                categoryTitles[0].textContent = t.secadores;
                categoryTitles[1].textContent = t.planchado;
                categoryTitles[2].textContent = t.portamaletas;
            }
            
            // Actualizar botones de navegación
            updateNavigationButtons(lang);
        }
        
        // Función para actualizar botones de navegación
        function updateNavigationButtons(lang) {
            const navTranslations = {
                pt: {
                    budget: 'Orçamento',
                    history: 'Histórico',
                    createProduct: 'Criador/Editor',
                    home: 'Home',
                    products: 'Products'
                },
                es: {
                    budget: 'Presupuesto',
                    history: 'Histórico',
                    createProduct: 'Creador/Editor',
                    home: 'Home',
                    products: 'Products'
                },
                en: {
                    budget: 'Budget',
                    history: 'History',
                    createProduct: 'Creator/Editor',
                    home: 'Home',
                    products: 'Products'
                }
            };
            
            const t = navTranslations[lang] || navTranslations.pt;
            
            // Actualizar enlaces de navegación
            const cartLink = document.getElementById('nav-cart-link');
            const proposalsLink = document.getElementById('nav-proposals-link');
            const createProductLink = document.getElementById('create-product-text');
            const homeLink = document.querySelector('a[href="index.html"].nav-link');
            const productsLink = document.querySelector('a[href="productos-dinamico.html"].nav-link');
            
            if (cartLink) cartLink.textContent = t.budget;
            if (proposalsLink) {
                // Ahora es un link directo, no tiene span dentro
                proposalsLink.textContent = t.history;
            }
            if (createProductLink) createProductLink.textContent = t.createProduct;
            if (homeLink) homeLink.textContent = t.home;
            if (productsLink) productsLink.textContent = t.products;
        }

        // Variables globales
        let supabaseClient = null;
        let homeCategories = [];

        // Inicializar Supabase - usar siempre el cliente compartido
        async function initSupabase() {
            try {
                if (supabaseClient) {
                    return supabaseClient;
                }

                // Asegurar que universalSupabase esté disponible
                if (!window.universalSupabase) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                }

                if (window.universalSupabase) {
                    supabaseClient = await window.universalSupabase.getClient();
                    if (supabaseClient) {
                return supabaseClient;
                    }
                }
                
                console.error('❌ No se pudo inicializar Supabase');
                return null;
            } catch (error) {
                console.error('❌ Error al inicializar Supabase:', error);
                return null;
            }
        }

        // Cargar categorías del home desde Supabase
        async function loadHomeCategories() {
            const grid = document.getElementById('categoriesGrid');
            if (!grid) {
                console.error('❌ No se encontró el elemento categoriesGrid');
                return;
            }

            // Mostrar indicador de carga
            grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);"><i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i><p>Cargando categorías...</p></div>';

            const client = await initSupabase();
            if (!client) {
                console.error('❌ No se pudo obtener el cliente de Supabase');
                grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-danger);"><p>Error al conectar con la base de datos. Por favor, recarga la página.</p></div>';
                return;
            }

            try {
                // Cargar solo categorías activas (sin ordenar por número, se ordenarán alfabéticamente)
                const { data, error } = await client
                    .from('categorias_geral')
                    .select('*')
                    .eq('tipo', 'home')
                    .eq('is_active', true);

                if (error) {
                    console.error('❌ Error de Supabase:', error);
                    console.error('❌ Código de error:', error.code);
                    console.error('❌ Mensaje:', error.message);
                    console.error('❌ Detalles:', error.details);
                    console.error('❌ Hint:', error.hint);
                    
                    // Si es error de permisos RLS, mostrar mensaje específico
                    if (error.code === '42501' || error.message?.includes('permission denied') || error.message?.includes('row-level security')) {
                        grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-danger);"><p>❌ Error de permisos en la base de datos</p><p style="margin-top: 10px; font-size: 0.9rem;">Necesitas configurar las políticas RLS en Supabase para permitir lectura de categorias_geral a usuarios autenticados.</p><p style="margin-top: 10px; font-size: 0.85rem; color: var(--text-secondary);">Consulta SOLUCION-CATEGORIAS.md para más información.</p></div>';
                        return;
                    }
                    
                    throw error;
                }

                homeCategories = data || [];

                if (homeCategories.length === 0) {
                    grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);"><p>No hay categorías disponibles. Contacta al administrador.</p></div>';
                    return;
                }

                // Renderizar categorías
                renderHomeCategories();
            } catch (error) {
                console.error('❌ Error cargando categorías del home:', error);
                grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-danger);"><p>Error al cargar las categorías: ' + (error.message || 'Error desconocido') + '</p><p style="margin-top: 10px; font-size: 0.9rem;">Por favor, recarga la página.</p></div>';
            }
        }

        // Renderizar categorías en el grid
        function renderHomeCategories() {
            const grid = document.getElementById('categoriesGrid');
            if (!grid) return;

            const currentLang = localStorage.getItem('language') || 'pt';

            // Ordenar categorías alfabéticamente según el idioma seleccionado
            const sortedCategories = [...homeCategories].sort((a, b) => {
                // Obtener nombre según idioma para comparación
                const nombreA = currentLang === 'es' ? (a.nombre_es || '') : 
                               currentLang === 'pt' ? (a.nombre_pt || '') : 
                               (a.nombre_es || '');
                const nombreB = currentLang === 'es' ? (b.nombre_es || '') : 
                               currentLang === 'pt' ? (b.nombre_pt || '') : 
                               (b.nombre_es || '');
                
                // Comparar alfabéticamente (case-insensitive)
                return nombreA.localeCompare(nombreB, currentLang === 'pt' ? 'pt' : currentLang === 'es' ? 'es' : 'en', { 
                    sensitivity: 'base',
                    ignorePunctuation: true 
                });
            });

            let html = '';
            sortedCategories.forEach(category => {
                // Obtener nombre según idioma
                const nombre = currentLang === 'es' ? category.nombre_es : 
                              currentLang === 'pt' ? category.nombre_pt : 
                              category.nombre_es; // Fallback a español

                // URL de destino con parámetro de categoría para filtrar automáticamente
                const categorySlug = category.nombre_es.toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/[^a-z0-9-]/g, '');
                const href = `productos-dinamico.html?category=${categorySlug}`;

                // Validar que la foto existe y no está vacía
                const fotoUrl = category.foto && category.foto.trim() ? category.foto.trim() : null;

                html += `
                    <a class="category-card" href="${href}" data-category-id="${category.id}" data-category-name="${category.nombre_es}" data-foto-url="${fotoUrl || ''}">
                        ${fotoUrl ? 
                            `<img src="${fotoUrl}" alt="${nombre}" 
                                onerror="console.error('❌ Error cargando imagen para categoría ${category.nombre_es}:', '${fotoUrl}'); this.style.display='none';" 
                                onload=""
                                loading="lazy"
                                data-foto-original="${fotoUrl}">` :
                            `<div style="width: 100%; height: 100%; background: #F8FAFC; border: 1px solid #E2E8F0; display: flex; align-items: center; justify-content: center; color: #64748B;">
                                <i class="fas fa-image" style="font-size: 2.5rem;"></i>
                            </div>`
                        }
                        <div class="overlay">
                            <div class="title">${nombre}</div>
                        </div>
                    </a>
                `;
            });

            grid.innerHTML = html || '<div style="text-align: center; padding: 40px; color: var(--text-secondary);"><p>No hay categorías disponibles</p></div>';
            
        }

        // Actualizar categorías cuando cambia el idioma
        function updatePageContent(lang) {
            const translations = {
                pt: {
                    title: 'Categorias',
                    subtitle: 'Descubra nossa ampla gama de produtos para hotéis'
                },
                es: {
                    title: 'Categorías',
                    subtitle: 'Descubre nuestra amplia gama de productos para hoteles'
                },
                en: {
                    title: 'Categories',
                    subtitle: 'Discover our wide range of products for hotels'
                }
            };

            const t = translations[lang] || translations.pt;
            
            // Actualizar título y subtítulo
            const titleElement = document.querySelector('.comparison-hero h1');
            const subtitleElement = document.querySelector('.comparison-hero p');
            
            if (titleElement) titleElement.textContent = t.title;
            if (subtitleElement) subtitleElement.textContent = t.subtitle;
            
            // Re-renderizar categorías con el nuevo idioma
            if (homeCategories.length > 0) {
                renderHomeCategories();
            }
            
            // Actualizar botones de navegación
            updateNavigationButtons(lang);
        }

        /**
         * Función para actualizar el contador del carrito en el botón de navegación
         * Versión standalone que no requiere carrito-compras.js
         */
        function updateCartBadgeStandalone() {
            try {
                // Leer el carrito desde localStorage
                const savedCart = localStorage.getItem('eppo_cart');
                let cartCount = 0;
                
                if (savedCart) {
                    try {
                        const cart = JSON.parse(savedCart);
                        cartCount = cart ? cart.length : 0;
                    } catch (e) {
                        cartCount = 0;
                    }
                }
                
                // Buscar el botón en todas las páginas
                const cartLink = document.getElementById('nav-cart-link');
                
                if (cartLink) {
                    // Remover badge existente si existe
                    const existingBadge = cartLink.querySelector('.cart-badge');
                    if (existingBadge) {
                        existingBadge.remove();
                    }
                    
                    // Agregar badge solo si hay items en el carrito
                    if (cartCount > 0) {
                        const badge = document.createElement('span');
                        badge.className = 'cart-badge';
                        // Agregar clase para números de dos dígitos
                        if (cartCount > 9) {
                            badge.classList.add('double-digit');
                        }
                        badge.textContent = cartCount;
                        cartLink.appendChild(badge);
                    }
                }
            } catch (error) {
                console.error('Error actualizando badge del carrito:', error);
            }
        }

        // Inicializar idioma y cargar categorías al cargar la página
        document.addEventListener('DOMContentLoaded', async function() {
            // Si por rewrite se sirvió index para /reset-password, ir a la página dedicada (sin layout)
            const pathname = (window.location.pathname || '').toLowerCase();
            if (pathname.includes('reset-password')) {
                window.location.replace(window.location.origin + '/reset-password.html' + (window.location.search || '') + (window.location.hash || ''));
                return;
            }
            
            // Actualizar contador del carrito al cargar la página
            // Intentar usar la función global si está disponible, sino usar la standalone
            if (typeof window.updateCartBadge === 'function') {
                window.updateCartBadge();
            } else {
                updateCartBadgeStandalone();
            }
            
            // También actualizar después de un pequeño delay para asegurar que el DOM esté completamente cargado
            setTimeout(() => {
                if (typeof window.updateCartBadge === 'function') {
                    window.updateCartBadge();
                } else {
                    updateCartBadgeStandalone();
                }
            }, 500);
            
            // Actualizar el contador cuando la ventana recibe foco (cuando el usuario vuelve a esta página)
            window.addEventListener('focus', function() {
                if (typeof window.updateCartBadge === 'function') {
                    window.updateCartBadge();
                } else {
                    updateCartBadgeStandalone();
                }
            });
            
            // Escuchar cambios en localStorage (para cuando se actualiza el carrito desde otra pestaña)
            window.addEventListener('storage', function(e) {
                if (e.key === 'eppo_cart') {
                    if (typeof window.updateCartBadge === 'function') {
                        window.updateCartBadge();
                    } else {
                        updateCartBadgeStandalone();
                    }
                }
            });
            
            // En local (file://) o sin usuario autenticado: no se permite ver datos de Supabase (redirige a login)
            const isAuth = window.authManager && await window.authManager.requireAuth('login.html');
            if (!isAuth) {
                return;
            }

            // Configurar idioma (no bloquea)
            // La función global changeLanguage se inicializa automáticamente desde translation-system.js
            // Solo inicializar elementos específicos de esta página
            initPageLanguage();
            
            // Inicializar Supabase y cargar categorías del home
            try {
            await initSupabase();
            await loadHomeCategories();
            } catch (error) {
                console.error('❌ Error inicializando Supabase o cargando categorías:', error);
                console.error('❌ Stack trace:', error.stack);
                const grid = document.getElementById('categoriesGrid');
                if (grid) {
                    grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-danger);"><p>Error al cargar las categorías. Por favor, recarga la página.</p><p style="margin-top: 10px; font-size: 0.9rem;">Error: ' + (error.message || 'Desconocido') + '</p></div>';
                }
            }
        });
    </script>
    <script src="menu-hamburguesa.js"></script>
    <script src="theme-common.js"></script>
    <script src="chat-widget.js"></script>
</body>
</html>
